<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BRGK BY VIPIN - UP Board 12th Preparation 2026-27</title>
  <style>
    /* --- Color Variables for Dark/Light Mode --- */
    :root {
      --primary-color: #007BFF;
      --secondary-color: #FF0000;
      --bg-color: #f8f9fa;
      --text-color: #333333;
      --card-bg: #ffffff;
      --border-color: #e0e0e0;
      --hover-color: #0056b3;
    }

    body.dark-mode {
      --primary-color: #4da3ff;
      --bg-color: #121212;
      --text-color: #f1f1f1;
      --card-bg: #1e1e1e;
      --border-color: #333333;
      --hover-color: #80bdff;
    }

    /* --- Global Styles --- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      transition: all 0.3s ease;
      line-height: 1.6;
    }

    a {
      text-decoration: none;
      color: var(--primary-color);
    }

    /* --- Header & Navigation --- */
    header {
      background-color: var(--card-bg);
      padding: 15px 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      color: var(--primary-color);
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
    }

    nav ul li a {
      font-weight: 500;
      color: var(--text-color);
      transition: color 0.3s;
    }

    nav ul li a:hover {
      color: var(--primary-color);
    }

    .mode-btn {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--text-color);
    }

    /* --- Hero Section --- */
    .hero {
      text-align: center;
      padding: 60px 20px;
      background: linear-gradient(135deg, var(--primary-color), #8e44ad);
      color: white;
    }

    .hero h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 1.2rem;
      max-width: 600px;
      margin: 0 auto 20px;
    }

    /* --- Sections & Cards Layout --- */
    section {
      padding: 50px 5%;
      text-align: center;
    }

    section h2 {
      font-size: 2rem;
      margin-bottom: 30px;
      color: var(--primary-color);
      text-transform: uppercase;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background-color: var(--card-bg);
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      border: 1px solid var(--border-color);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 15px rgba(0,0,0,0.1);
    }

    .card h3 {
      margin-bottom: 15px;
      font-size: 1.3rem;
    }

    .btn {
      display: inline-block;
      padding: 10px 20px;
      margin-top: 15px;
      background-color: var(--primary-color);
      color: white !important;
      border-radius: 25px;
      font-weight: bold;
      transition: background 0.3s;
    }

    .btn:hover {
      background-color: var(--hover-color);
    }

    .btn-red {
      background-color: var(--secondary-color);
    }

    .btn-red:hover {
      background-color: #cc0000;
    }

    /* --- Footer --- */
    footer {
      background-color: var(--card-bg);
      text-align: center;
      padding: 20px;
      border-top: 1px solid var(--border-color);
      margin-top: 40px;
    }

    /* --- Responsive Design --- */
    @media (max-width: 768px) {
      nav ul {
        display: none;
      }
      .hero h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">BRGK BY VIPIN</div>
    <nav>
      <ul>
        <li><a href="#syllabus">Syllabus</a></li>

        <li><a href="#modelpapers">Model Papers</a></li>
        <li><a href="#freepdf">Free PDFs</a></li>
      </ul>
    </nav>

  </section>
